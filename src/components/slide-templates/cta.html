<!-- CTA Slide Template (Slide 7 — Last) -->
<!-- No swipe arrow. Progress bar at 100%. -->
<div class="slide slide-cta" style="background: linear-gradient(135deg, {{BRAND_PRIMARY}}, {{BRAND_DARK}});">
  <div class="progress-bar full" style="background: rgba(255,255,255,0.4);"></div>
  <div class="slide-content">
    <h2 class="cta-headline" style="font-family: {{FONT_HEADING}};">{{CTA_HEADLINE}}</h2>
    <p class="cta-body" style="font-family: {{FONT_BODY}};">{{CTA_BODY}}</p>
    <div class="cta-button" style="background: white; color: {{BRAND_PRIMARY}};">{{CTA_BUTTON}}</div>
    <p class="handle" style="font-family: {{FONT_BODY}};">@{{HANDLE}}</p>
  </div>
  <!-- No swipe arrow on last slide -->
</div>
