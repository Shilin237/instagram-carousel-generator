<!-- Hero Slide Template (Slide 1) -->
<!-- Variables: {{BRAND_NAME}}, {{HEADLINE}}, {{HANDLE}}, {{BRAND_PRIMARY}}, {{LIGHT_BG}}, {{FONT_HEADING}}, {{FONT_BODY}} -->
<div class="slide slide-hero" style="background: {{LIGHT_BG}};">
  <div class="progress-bar" style="background: {{BRAND_PRIMARY}};"></div>
  <div class="slide-content">
    <span class="brand-tag">{{BRAND_NAME}}</span>
    <h1 class="headline" style="font-family: {{FONT_HEADING}};">{{HEADLINE}}</h1>
    <p class="handle" style="font-family: {{FONT_BODY}};">@{{HANDLE}}</p>
  </div>
  <div class="swipe-arrow">→</div>
</div>
